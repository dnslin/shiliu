env: prod
http:
  host: 0.0.0.0
  #  host: 127.0.0.1
  port: 8000
security:
  api_sign:
    app_key: 123456
    app_security: 123456
  jwt:
    key: QQYnRFerJTSEcrfB89fw8prOaObmrch8
data:
  db:
    user:
      driver: sqlite
      dsn: "storage/shiliu.db?_busy_timeout=5000"
      debug: false
task:
  # Allowed values: 0 (off), 30, 60, 360, 1440 minutes.
  fetch_interval_minutes: 60
ai:
  # OpenAI-compatible chat completions endpoint. Replace before enabling summaries.
  api_base_url: "https://api.example.com/v1"
  api_key: ""
  model: "your-model-name"
log:
  log_level: info
  mode: file               #  file or console or both
  encoding: json           # json or console
  log_file_name: "./storage/logs/server.log"
  max_backups: 30
  max_age: 7
  max_size: 1024
  compress: true
