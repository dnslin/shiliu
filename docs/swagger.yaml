definitions:
  v1.AIServiceConfigResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.AIServiceConfigResponseData'
      message:
        type: string
    type: object
  v1.AIServiceConfigResponseData:
    properties:
      apiBaseUrl:
        type: string
      apiKeyConfigured:
        type: boolean
      configured:
        type: boolean
      model:
        type: string
    type: object
  v1.AISummaryResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.AISummaryResponseData'
      message:
        type: string
    type: object
  v1.AISummaryResponseData:
    properties:
      contentItemId:
        type: integer
      error:
        type: string
      generatedAt:
        type: string
      markdown:
        type: string
      message:
        type: string
      state:
        example: success
        type: string
    type: object
  v1.AssignContentItemTagsRequest:
    properties:
      tagIds:
        items:
          type: integer
        type: array
    required:
    - tagIds
    type: object
  v1.AssignFeedFolderRequest:
    properties:
      folderId:
        type: integer
        x-nullable: true
    required:
    - folderId
    type: object
  v1.AutoSummaryConfigResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.AutoSummaryConfigResponseData'
      message:
        type: string
    type: object
  v1.AutoSummaryConfigResponseData:
    properties:
      contentTypeScope:
        example: all
        type: string
      enabled:
        type: boolean
      enabledAt:
        type: string
    type: object
  v1.ChangePasswordRequest:
    properties:
      newPassword:
        example: "1234567890123"
        maxLength: 72
        minLength: 12
        type: string
      oldPassword:
        example: "123456789012"
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  v1.ContentItemDetailResponseData:
    properties:
      audioProgressSeconds:
        type: integer
      availableText:
        type: string
      contentSafe:
        type: string
      contentType:
        example: text
        type: string
      descriptionSafe:
        type: string
      favorited:
        type: boolean
      feedId:
        type: integer
      fetchedAt:
        type: string
      id:
        type: integer
      markedLater:
        type: boolean
      processingStatus:
        example: unprocessed
        type: string
      publishedAt:
        type: string
      showNotesSafe:
        type: string
      title:
        type: string
    type: object
  v1.ContentItemListItemData:
    properties:
      audioProgressSeconds:
        type: integer
      availableText:
        type: string
      contentType:
        example: text
        type: string
      favorited:
        type: boolean
      feedId:
        type: integer
      fetchedAt:
        type: string
      id:
        type: integer
      markedLater:
        type: boolean
      processingStatus:
        example: unprocessed
        type: string
      publishedAt:
        type: string
      title:
        type: string
    type: object
  v1.CreateFeedRequest:
    properties:
      feedUrl:
        example: https://example.com/feed.xml
        type: string
    required:
    - feedUrl
    type: object
  v1.CreateFeedResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.CreateFeedResponseData'
      message:
        type: string
    type: object
  v1.CreateFeedResponseData:
    properties:
      feedUrl:
        type: string
      fetchedItems:
        type: integer
      id:
        type: integer
      insertedItems:
        type: integer
      type:
        example: rss
        type: string
    type: object
  v1.CreateFolderRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  v1.CreateTagRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  v1.FeedResponseData:
    properties:
      feedUrl:
        type: string
      fetchStatus:
        example: success
        type: string
      folderId:
        type: integer
      id:
        type: integer
      lastFetchError:
        type: string
      lastFetchedAt:
        type: string
      type:
        example: rss
        type: string
    type: object
  v1.FolderResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.FolderResponseData'
      message:
        type: string
    type: object
  v1.FolderResponseData:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  v1.GetContentItemResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.ContentItemDetailResponseData'
      message:
        type: string
    type: object
  v1.GetProfileResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.GetProfileResponseData'
      message:
        type: string
    type: object
  v1.GetProfileResponseData:
    properties:
      id:
        type: integer
      username:
        example: shiliu
        type: string
    type: object
  v1.InitializationStatusResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.InitializationStatusResponseData'
      message:
        type: string
    type: object
  v1.InitializationStatusResponseData:
    properties:
      initialized:
        type: boolean
    type: object
  v1.InitializeRequest:
    properties:
      password:
        example: "123456789012"
        type: string
      username:
        example: shiliu
        type: string
    required:
    - password
    - username
    type: object
  v1.ListContentItemsResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.ListContentItemsResponseData'
      message:
        type: string
    type: object
  v1.ListContentItemsResponseData:
    properties:
      items:
        items:
          $ref: '#/definitions/v1.ContentItemListItemData'
        type: array
      page:
        $ref: '#/definitions/v1.PageMeta'
    type: object
  v1.ListFeedsResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.ListFeedsResponseData'
      message:
        type: string
    type: object
  v1.ListFeedsResponseData:
    properties:
      items:
        items:
          $ref: '#/definitions/v1.FeedResponseData'
        type: array
      total:
        type: integer
    type: object
  v1.ListFoldersResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.ListFoldersResponseData'
      message:
        type: string
    type: object
  v1.ListFoldersResponseData:
    properties:
      items:
        items:
          $ref: '#/definitions/v1.FolderResponseData'
        type: array
      total:
        type: integer
    type: object
  v1.ListTagsResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.ListTagsResponseData'
      message:
        type: string
    type: object
  v1.ListTagsResponseData:
    properties:
      items:
        items:
          $ref: '#/definitions/v1.TagResponseData'
        type: array
      total:
        type: integer
    type: object
  v1.LoginRequest:
    properties:
      password:
        example: "123456789012"
        type: string
      username:
        example: shiliu
        type: string
    required:
    - password
    - username
    type: object
  v1.LoginResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.LoginResponseData'
      message:
        type: string
    type: object
  v1.LoginResponseData:
    properties:
      accessToken:
        type: string
    type: object
  v1.PageMeta:
    properties:
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  v1.RefreshFeedResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.RefreshFeedResponseData'
      message:
        type: string
    type: object
  v1.RefreshFeedResponseData:
    properties:
      feedId:
        type: integer
      feedUrl:
        type: string
      fetchedItems:
        type: integer
      insertedItems:
        type: integer
      message:
        type: string
      skippedExistingItems:
        type: integer
      status:
        example: success
        type: string
    type: object
  v1.RefreshFeedsResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.RefreshFeedsResponseData'
      message:
        type: string
    type: object
  v1.RefreshFeedsResponseData:
    properties:
      failed:
        type: integer
      items:
        items:
          $ref: '#/definitions/v1.RefreshFeedResponseData'
        type: array
      refreshed:
        type: integer
      skipped:
        type: integer
      total:
        type: integer
    type: object
  v1.RenameFolderRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  v1.RenameTagRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  v1.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  v1.SaveAIServiceConfigRequest:
    properties:
      apiBaseUrl:
        example: https://api.example.com/v1
        type: string
      apiKey:
        type: string
      model:
        example: gpt-4.1-mini
        type: string
    required:
    - apiBaseUrl
    - apiKey
    - model
    type: object
  v1.SaveAutoSummaryConfigRequest:
    properties:
      contentTypeScope:
        example: all
        type: string
      enabled:
        type: boolean
    required:
    - contentTypeScope
    type: object
  v1.TagResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.TagResponseData'
      message:
        type: string
    type: object
  v1.TagResponseData:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  v1.TestAIServiceConfigResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.TestAIServiceConfigResponseData'
      message:
        type: string
    type: object
  v1.TestAIServiceConfigResponseData:
    properties:
      ok:
        type: boolean
    type: object
  v1.UpdateContentItemAudioProgressRequest:
    properties:
      audioProgressSeconds:
        type: integer
    required:
    - audioProgressSeconds
    type: object
  v1.UpdateContentItemMarkRequest:
    properties:
      marked:
        type: boolean
    required:
    - marked
    type: object
  v1.UpdateContentItemProcessingStatusRequest:
    properties:
      processingStatus:
        type: string
    required:
    - processingStatus
    type: object
host: localhost:8000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Nunu Example API
  version: 1.0.0
paths:
  /ai/auto-summary-config:
    get:
      description: 返回自动摘要全局开关、内容类型范围和当前生效时间。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.AutoSummaryConfigResponse'
      security:
      - Bearer: []
      summary: 读取自动摘要配置
      tags:
      - AI 服务配置模块
    put:
      consumes:
      - application/json
      description: 保存自动摘要全局开关和内容类型范围；开启时只对开启后新入库且摘要状态为 none 的内容生效。
      parameters:
      - description: auto summary config
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.SaveAutoSummaryConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.AutoSummaryConfigResponse'
      security:
      - Bearer: []
      summary: 保存自动摘要配置
      tags:
      - AI 服务配置模块
  /ai/service-config:
    get:
      description: 返回 AI 服务配置状态、base URL 和模型名；不回显完整 API Key。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.AIServiceConfigResponse'
      security:
      - Bearer: []
      summary: 读取 AI 服务配置状态
      tags:
      - AI 服务配置模块
    put:
      consumes:
      - application/json
      description: 保存 OpenAI-compatible AI 服务配置；只做格式校验，不强制连通性测试。
      parameters:
      - description: ai service config
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.SaveAIServiceConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.AIServiceConfigResponse'
      security:
      - Bearer: []
      summary: 保存 AI 服务配置
      tags:
      - AI 服务配置模块
  /ai/service-config/test:
    post:
      description: 主动对已保存 AI 服务配置发起一次 OpenAI-compatible Chat Completions 连通性测试。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.TestAIServiceConfigResponse'
      security:
      - Bearer: []
      summary: 测试 AI 服务配置
      tags:
      - AI 服务配置模块
  /content-items:
    get:
      description: 统一内容列表查询入口，支持关键词搜索、内容类型、处理状态、内容标记和订阅源单值 AND 过滤
      parameters:
      - description: 'content type: text/audio'
        in: query
        name: content_type
        type: string
      - description: 'processing status: unprocessed/completed'
        in: query
        name: processing_status
        type: string
      - description: 'content mark: later/favorite'
        in: query
        name: mark
        type: string
      - description: feed id
        in: query
        name: feed_id
        type: integer
      - description: tag id
        in: query
        name: tag_id
        type: integer
      - description: folder id
        in: query
        name: folder_id
        type: integer
      - description: search keyword, max 128 characters
        in: query
        name: keyword
        type: string
      - description: page
        in: query
        name: page
        type: integer
      - description: page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.ListContentItemsResponse'
      security:
      - Bearer: []
      summary: 查询统一内容条目列表
      tags:
      - 内容条目模块
  /content-items/{id}:
    get:
      description: 返回单条内容条目的详情与安全渲染字段
      parameters:
      - description: content item id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.GetContentItemResponse'
      security:
      - Bearer: []
      summary: 查询内容条目详情
      tags:
      - 内容条目模块
  /content-items/{id}/ai-summary:
    post:
      description: 基于内容条目可用文本触发 OpenAI-compatible 非流式摘要；pending 返回正在生成，insufficient_text
        不重试。
      parameters:
      - description: content item id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.AISummaryResponse'
      security:
      - Bearer: []
      summary: 手动生成内容条目 AI 摘要
      tags:
      - 内容条目模块
  /content-items/{id}/audio-progress:
    put:
      consumes:
      - application/json
      description: 仅持久化音频型内容条目的播放位置，不持久化文本阅读位置，也不改变处理状态。
      parameters:
      - description: content item id
        in: path
        name: id
        required: true
        type: integer
      - description: audio progress seconds
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateContentItemAudioProgressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.GetContentItemResponse'
      security:
      - Bearer: []
      summary: 更新音频播放进度
      tags:
      - 内容条目模块
  /content-items/{id}/marks/{mark}:
    put:
      consumes:
      - application/json
      description: 独立设置或取消稍后处理、收藏标记，不改变处理状态或消费进度。
      parameters:
      - description: content item id
        in: path
        name: id
        required: true
        type: integer
      - description: 'content mark: later/favorite'
        in: path
        name: mark
        required: true
        type: string
      - description: content mark state
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateContentItemMarkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.GetContentItemResponse'
      security:
      - Bearer: []
      summary: 更新内容条目标记
      tags:
      - 内容条目模块
  /content-items/{id}/processing-status:
    put:
      consumes:
      - application/json
      description: 手动在未处理和已完成之间切换内容条目的处理状态，不改变内容标记或消费进度。
      parameters:
      - description: content item id
        in: path
        name: id
        required: true
        type: integer
      - description: processing status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateContentItemProcessingStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.GetContentItemResponse'
      security:
      - Bearer: []
      summary: 更新内容条目处理状态
      tags:
      - 内容条目模块
  /content-items/{id}/tags:
    delete:
      consumes:
      - application/json
      description: 从单个内容条目移除多个标签。
      parameters:
      - description: content item id
        in: path
        name: id
        required: true
        type: integer
      - description: tag ids
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.AssignContentItemTagsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Response'
      security:
      - Bearer: []
      summary: 移除内容条目标签
      tags:
      - 标签模块
    put:
      consumes:
      - application/json
      description: 给单个内容条目添加多个已有标签，不即时新建标签。
      parameters:
      - description: content item id
        in: path
        name: id
        required: true
        type: integer
      - description: tag ids
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.AssignContentItemTagsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Response'
      security:
      - Bearer: []
      summary: 给内容条目添加标签
      tags:
      - 标签模块
  /content-views/completed:
    get:
      description: Completed view presets processing_status=completed and accepts
        additional single-value filters.
      parameters:
      - description: 'content type: text/audio'
        in: query
        name: content_type
        type: string
      - description: 'content mark: later/favorite'
        in: query
        name: mark
        type: string
      - description: feed id
        in: query
        name: feed_id
        type: integer
      - description: tag id
        in: query
        name: tag_id
        type: integer
      - description: folder id
        in: query
        name: folder_id
        type: integer
      - description: search keyword, max 128 characters
        in: query
        name: keyword
        type: string
      - description: page
        in: query
        name: page
        type: integer
      - description: page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.ListContentItemsResponse'
      security:
      - Bearer: []
      summary: List completed content items
      tags:
      - Content item module
  /content-views/favorite:
    get:
      description: Favorite view presets mark=favorite and accepts additional single-value
        filters.
      parameters:
      - description: 'content type: text/audio'
        in: query
        name: content_type
        type: string
      - description: 'processing status: unprocessed/completed'
        in: query
        name: processing_status
        type: string
      - description: feed id
        in: query
        name: feed_id
        type: integer
      - description: tag id
        in: query
        name: tag_id
        type: integer
      - description: folder id
        in: query
        name: folder_id
        type: integer
      - description: search keyword, max 128 characters
        in: query
        name: keyword
        type: string
      - description: page
        in: query
        name: page
        type: integer
      - description: page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.ListContentItemsResponse'
      security:
      - Bearer: []
      summary: List favorite content items
      tags:
      - Content item module
  /content-views/inbox:
    get:
      description: Inbox view presets processing_status=unprocessed and accepts additional
        single-value filters.
      parameters:
      - description: 'content type: text/audio'
        in: query
        name: content_type
        type: string
      - description: 'content mark: later/favorite'
        in: query
        name: mark
        type: string
      - description: feed id
        in: query
        name: feed_id
        type: integer
      - description: tag id
        in: query
        name: tag_id
        type: integer
      - description: folder id
        in: query
        name: folder_id
        type: integer
      - description: search keyword, max 128 characters
        in: query
        name: keyword
        type: string
      - description: page
        in: query
        name: page
        type: integer
      - description: page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.ListContentItemsResponse'
      security:
      - Bearer: []
      summary: List inbox content items
      tags:
      - Content item module
  /content-views/later:
    get:
      description: Later view presets mark=later and accepts additional single-value
        filters.
      parameters:
      - description: 'content type: text/audio'
        in: query
