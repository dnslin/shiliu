definitions:
  v1.ChangePasswordRequest:
    properties:
      newPassword:
        example: "1234567890123"
        maxLength: 72
        minLength: 12
        type: string
      oldPassword:
        example: "123456789012"
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  v1.CreateFeedRequest:
    properties:
      feedUrl:
        example: https://example.com/feed.xml
        type: string
    required:
    - feedUrl
    type: object
  v1.CreateFeedResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.CreateFeedResponseData'
      message:
        type: string
    type: object
  v1.CreateFeedResponseData:
    properties:
      feedUrl:
        type: string
      fetchedItems:
        type: integer
      id:
        type: integer
      insertedItems:
        type: integer
      type:
        example: rss
        type: string
    type: object
  v1.FeedResponseData:
    properties:
      feedUrl:
        type: string
      fetchStatus:
        example: success
        type: string
      folderId:
        type: integer
      id:
        type: integer
      lastFetchError:
        type: string
      lastFetchedAt:
        type: string
      type:
        example: rss
        type: string
    type: object
  v1.GetProfileResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.GetProfileResponseData'
      message:
        type: string
    type: object
  v1.GetProfileResponseData:
    properties:
      id:
        type: integer
      username:
        example: shiliu
        type: string
    type: object
  v1.InitializationStatusResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.InitializationStatusResponseData'
      message:
        type: string
    type: object
  v1.InitializationStatusResponseData:
    properties:
      initialized:
        type: boolean
    type: object
  v1.InitializeRequest:
    properties:
      password:
        example: "123456789012"
        type: string
      username:
        example: shiliu
        type: string
    required:
    - password
    - username
    type: object
  v1.ListFeedsResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.ListFeedsResponseData'
      message:
        type: string
    type: object
  v1.ListFeedsResponseData:
    properties:
      items:
        items:
          $ref: '#/definitions/v1.FeedResponseData'
        type: array
      total:
        type: integer
    type: object
  v1.LoginRequest:
    properties:
      password:
        example: "123456789012"
        type: string
      username:
        example: shiliu
        type: string
    required:
    - password
    - username
    type: object
  v1.LoginResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.LoginResponseData'
      message:
        type: string
    type: object
  v1.LoginResponseData:
    properties:
      accessToken:
        type: string
    type: object
  v1.RefreshFeedResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.RefreshFeedResponseData'
      message:
        type: string
    type: object
  v1.RefreshFeedResponseData:
    properties:
      feedId:
        type: integer
      feedUrl:
        type: string
      fetchedItems:
        type: integer
      insertedItems:
        type: integer
      message:
        type: string
      skippedExistingItems:
        type: integer
      status:
        example: success
        type: string
    type: object
  v1.RefreshFeedsResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/v1.RefreshFeedsResponseData'
      message:
        type: string
    type: object
  v1.RefreshFeedsResponseData:
    properties:
      failed:
        type: integer
      items:
        items:
          $ref: '#/definitions/v1.RefreshFeedResponseData'
        type: array
      refreshed:
        type: integer
      skipped:
        type: integer
      total:
        type: integer
    type: object
  v1.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:8000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Nunu Example API
  version: 1.0.0
paths:
  /feeds:
    get:
      description: 返回所有订阅源及其当前 / 最后抓取状态、类型和所属文件夹
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.ListFeedsResponse'
      security:
      - Bearer: []
      summary: 查询订阅源列表
      tags:
      - 订阅源模块
    post:
      consumes:
      - application/json
      description: 抓取并解析成功后创建订阅源，按规范化 feed URL 去重
      parameters:
      - description: params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.CreateFeedRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.CreateFeedResponse'
      security:
      - Bearer: []
      summary: 添加订阅源
      tags:
      - 订阅源模块
  /feeds/{id}:
    delete:
      description: 删除订阅源并级联删除其内容条目及派生数据
      parameters:
      - description: feed id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Response'
      security:
      - Bearer: []
      summary: 删除订阅源
      tags:
      - 订阅源模块
  /feeds/{id}/refresh:
    post:
      description: 复用抓取 service 刷新单个订阅源；同源抓取进行中时返回 skipped 语义
      parameters:
      - description: feed id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.RefreshFeedResponse'
      security:
      - Bearer: []
      summary: 手动刷新单个订阅源
      tags:
      - 订阅源模块
  /feeds/refresh:
    post:
      description: 逐个复用抓取 service 刷新全部订阅源；同源抓取进行中时返回 skipped 语义
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.RefreshFeedsResponse'
      security:
      - Bearer: []
      summary: 手动刷新全部订阅源
      tags:
      - 订阅源模块
  /initialization:
    get:
      description: 返回拾流单实例是否已经创建唯一用户账户
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.InitializationStatusResponse'
      summary: 查询首次初始化状态
      tags:
      - 用户模块
    post:
      consumes:
      - application/json
      description: 尚无用户账户时创建唯一用户账户，成功后入口永久关闭
      parameters:
      - description: params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.InitializeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Response'
      summary: 首次初始化
      tags:
      - 用户模块
  /login:
    post:
      consumes:
      - application/json
      parameters:
      - description: params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.LoginResponse'
      summary: 账号登录
      tags:
      - 用户模块
  /user:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.GetProfileResponse'
      security:
      - Bearer: []
      summary: 获取用户信息
      tags:
      - 用户模块
  /user/password:
    put:
      consumes:
      - application/json
      description: 已登录用户使用旧密码修改为新密码
      parameters:
      - description: params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Response'
      security:
      - Bearer: []
      summary: 修改当前用户密码
      tags:
      - 用户模块
securityDefinitions:
  Bearer:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
