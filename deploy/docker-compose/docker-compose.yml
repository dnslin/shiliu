services:
  migration:
    image: shiliu-backend:local
    build:
      context: ../..
      dockerfile: deploy/build/Dockerfile
    command:
      - ./bin/migration
      - -conf
      - config/prod.yml
      - -direction
      - up
      - -path
      - migrations
    volumes:
      - shiliu_storage:/data/app/storage
    restart: "no"

  server:
    image: shiliu-backend:local
    command:
      - ./bin/server
      - -conf
      - config/prod.yml
    ports:
      - "${SHILIU_HTTP_PORT:-8000}:8000"
    volumes:
      - shiliu_storage:/data/app/storage
    depends_on:
      migration:
        condition: service_completed_successfully
    restart: unless-stopped

  task:
    image: shiliu-backend:local
    command:
      - ./bin/task
      - -conf
      - config/prod.yml
    volumes:
      - shiliu_storage:/data/app/storage
    depends_on:
      migration:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  shiliu_storage:
    name: shiliu_storage
